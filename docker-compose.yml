version: '3.8'

services:
  # ----------------------------------------------------
  # Frontend: Angular (Puerto 4200)
  # ----------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: clinica-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: >
      sh -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --poll 2000"
    environment:
      - NODE_ENV=development

  # ----------------------------------------------------
  # Backend: Next.js / BFF (Puerto 3000)
  # ----------------------------------------------------
  backend:
    image: node:20-alpine
    container_name: clinica-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_next_cache:/app/.next
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Redireccion de red interna de Docker: Next.js busca a Java por el nombre del contenedor
      - MS3_URL=http://springboot:8080/graphql
      # ms-blockchain por nombre de servicio dentro de la red Docker
      - BLOCKCHAIN_URL=http://ms-blockchain:3001
    depends_on:
      springboot:
        condition: service_healthy
      ms-blockchain:
        condition: service_started

  # ----------------------------------------------------
  # Spring Boot: Java / Gestion (Puerto 8080)
  # ----------------------------------------------------
  springboot:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: clinica-springboot
    working_dir: /app
    volumes:
      - ./springboot:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - PORT=8080
      # ms-gestion llama a ms-blockchain para registrar recetas controladas
      - BLOCKCHAIN_URL=http://ms-blockchain:3001
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /actuator/health HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ----------------------------------------------------
  # Blockchain: Node.js (Puerto 3001)
  # ----------------------------------------------------
  ms-blockchain:
    image: node:20-alpine
    container_name: clinica-blockchain
    working_dir: /app
    volumes:
      - ./block_movil/ms-blockchain:/app
      - blockchain_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    command: >
      sh -c "npm install && npm run dev"
    env_file:
      - ./block_movil/ms-blockchain/.env

  # ----------------------------------------------------
  # MS2: Diagnostico e IA (Python/FastAPI, Puerto 8000)
  # ----------------------------------------------------
  ms-diagnostico-ia:
    build:
      context: ./ms-diagnostico-ia
    container_name: clinica-ms-diagnostico-ia
    working_dir: /app
    volumes:
      - ./ms-diagnostico-ia/app:/app/app
      - ms_ia_data:/app/data
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./ms-diagnostico-ia/.env

  # ----------------------------------------------------
  # n8n: Motor de automatizacion (Puerto 5678)
  # ----------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: clinica-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/La_Paz
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clinica2025
    depends_on:
      springboot:
        condition: service_healthy

  # ----------------------------------------------------
  # PostgreSQL para Evolution API
  # ----------------------------------------------------
  evolution-db:
    image: postgres:15-alpine
    container_name: clinica-evolution-db
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution2025
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # Evolution API: WhatsApp Gateway (Puerto 8081)
  # ----------------------------------------------------
  evolution:
    image: atendai/evolution-api:latest
    container_name: clinica-evolution
    ports:
      - "8081:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=clinica_evolution_key_2025
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - QRCODE_LIMIT=30
      - WEBSOCKET_ENABLED=false
      - LOG_LEVEL=ERROR
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution2025@evolution-db:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_clinica
      - CACHE_REDIS_ENABLED=false
    depends_on:
      evolution-db:
        condition: service_healthy

volumes:
  frontend_node_modules:
  backend_node_modules:
  backend_next_cache:
  blockchain_node_modules:
  ms_ia_data:
  maven_cache:
  n8n_data:
  evolution_data:
  evolution_db_data:
