services:
  # ----------------------------------------------------
  # Frontend: Angular (Puerto 4200)
  # ----------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: clinica-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: >
      sh -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --poll 2000"
    environment:
      - NODE_ENV=development

  # ----------------------------------------------------
  # Backend: Next.js / BFF (Puerto 3000)
  # ----------------------------------------------------
  backend:
    image: node:20-alpine
    container_name: clinica-backend
    working_dir: /app
    volumes:
      - ./microservicios/ms-ms-pacientes-nextjs:/app
      - backend_node_modules:/app/node_modules
      - backend_next_cache:/app/.next
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Redireccion de red interna de Docker: Next.js busca a Java por el nombre del contenedor
      - MS3_URL=http://springboot:8080/graphql
      # ms-blockchain por nombre de servicio dentro de la red Docker
      - BLOCKCHAIN_URL=http://ms-blockchain:3001
    depends_on:
      springboot:
        condition: service_healthy
      ms-blockchain:
        condition: service_started

  # ----------------------------------------------------
  # Spring Boot: Java / Gestion (Puerto 8080)
  # ----------------------------------------------------
  springboot:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: clinica-springboot
    working_dir: /app
    volumes:
      - ./microservicios/ms-springboot-gestion:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - PORT=8080
      # ms-gestion llama a ms-blockchain para registrar recetas controladas
      - BLOCKCHAIN_URL=http://ms-blockchain:3001
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /actuator/health HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ----------------------------------------------------
  # Blockchain: Node.js (Puerto 3001)
  # ----------------------------------------------------
  ms-blockchain:
    image: node:20-alpine
    container_name: clinica-blockchain
    working_dir: /app
    volumes:
      - ./microservicios/ms-blockchain:/app
      - blockchain_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    command: >
      sh -c "npm install && npm run dev"
    env_file:
      - .env

  # ----------------------------------------------------
  # MS2: Diagnostico e IA (Python/FastAPI, Puerto 8000)
  # ----------------------------------------------------
  ms-diagnostico-ia:
    build:
      context: ./microservicios/ms-diagnostico-ia
    container_name: clinica-ms-diagnostico-ia
    working_dir: /app
    volumes:
      - ./microservicios/ms-diagnostico-ia/app:/app/app
      - ms_ia_data:/app/data
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: ./microservicios/ms-diagnostico-ia/.env
        required: false

  # ----------------------------------------------------
  # n8n: Motor de automatizacion (Puerto 5678)
  # ----------------------------------------------------
  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/La_Paz
    volumes:
      - n8n_data:/home/node/.n8n

  # ----------------------------------------------------
  # Evolution API v2: WhatsApp Gateway
  # ----------------------------------------------------
  evolution_api:
    profiles: ["whatsapp"]
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution_redis
      - evolution_postgres
    ports:
      - "8081:8080" # Cambiado a 8081 para no chocar con springboot (8080)
    volumes:
      - evolution_instances:/evolution/instances
    env_file:
      - path: ./evolution-v2/.env
        required: false
    expose:
      - "8080"

  evolution_frontend:
    profiles: ["whatsapp"]
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    restart: always
    ports:
      - "8082:80" # Cambiado a 8082 para no chocar con Next.js (3000)
    volumes:
      - ./evolution-v2/nginx-frontend.conf:/etc/nginx/conf.d/nginx.conf

  evolution_redis:
    profiles: ["whatsapp"]
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    expose:
      - "6379"

  evolution_postgres:
    profiles: ["whatsapp"]
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    env_file:
      - path: ./evolution-v2/.env
        required: false
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      # Valores hardcodeados que estaban en el .env para evitar fallos de parseo
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  frontend_node_modules:
  backend_node_modules:
  backend_next_cache:
  blockchain_node_modules:
  ms_ia_data:
  maven_cache:
  n8n_data:
  evolution_instances:
  evolution_redis:
  evolution_postgres_data:
