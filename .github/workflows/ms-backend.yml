# CI/CD de MS1 (ms-backend): se dispara solo cuando cambia su carpeta.
name: CI/CD ms-backend

on:
  push:
    branches: [main]
    paths:
      - "microservicios/ms-backend/**"
      - ".github/workflows/ms-backend.yml"
      - ".github/workflows/deploy-microservicio.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    uses: ./.github/workflows/deploy-microservicio.yml
    with:
      service_name: ms-backend
      service_path: microservicios/ms-backend
    secrets: inherit
