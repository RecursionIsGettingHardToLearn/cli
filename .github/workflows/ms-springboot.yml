# CI/CD de MS3 (ms-springboot): se dispara solo cuando cambia su carpeta.
name: CI/CD ms-springboot

on:
  push:
    branches: [main]
    paths:
      - "microservicios/ms-springboot/**"
      - ".github/workflows/ms-springboot.yml"
      - ".github/workflows/deploy-microservicio.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    uses: ./.github/workflows/deploy-microservicio.yml
    with:
      service_name: ms-springboot
      service_path: microservicios/ms-springboot
    secrets: inherit
