server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: cualquier ruta sin archivo fisico cae en index.html (router de Angular)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Estaticos con hash en el nombre: cache larga
  location ~* \.(js|css|woff2?|ttf|png|jpg|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
