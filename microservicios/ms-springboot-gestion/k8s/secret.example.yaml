# PLANTILLA - NO commitear el secret real.
# Crear el secret directamente en el cluster con:
#
#   kubectl create secret generic ms-springboot-gestion-secret -n clinica \
#     --from-literal=DB_URL="jdbc:postgresql://host:5432/postgres" \
#     --from-literal=DB_USER="tu_usuario" \
#     --from-literal=DB_PASS="tu_contrasena" \
#     --from-literal=SUPABASE_ISSUER="https://TU_PROYECTO.supabase.co/auth/v1" \
#     --from-literal=SUPABASE_JWKS_URI="https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json" \
#     --from-literal=STRIPE_SECRET_KEY="sk_test_..." \
#     --from-literal=STRIPE_WEBHOOK_SECRET="whsec_..."
#
apiVersion: v1
kind: Secret
metadata:
  name: ms-springboot-gestion-secret
type: Opaque
stringData:
  DB_URL: "jdbc:postgresql://host:5432/postgres"
  DB_USER: "tu_usuario"
  DB_PASS: "tu_contrasena"
  SUPABASE_ISSUER: "https://TU_PROYECTO.supabase.co/auth/v1"
  SUPABASE_JWKS_URI: "https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json"
  # Pagos online: la SECRET key de Stripe vive SOLO en el backend
  STRIPE_SECRET_KEY: "sk_test_..."
  STRIPE_WEBHOOK_SECRET: "whsec_..."
