# PLANTILLA - NO commitear el secret real.
# La PRIVATE_KEY vacia hace que el servicio arranque en modo SOLO LECTURA.
# Crear el secret directamente en el cluster con:
#
#   kubectl create secret generic ms-blockchain-secret -n clinica \
#     --from-literal=PRIVATE_KEY="" \
#     --from-literal=CONTRACT_ADDRESS="" \
#     --from-literal=SUPABASE_JWKS_URI="https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json"
#
apiVersion: v1
kind: Secret
metadata:
  name: ms-blockchain-secret
type: Opaque
stringData:
  # Wallet con MATIC de testnet (faucet.polygon.technology). NUNCA una llave real de mainnet.
  PRIVATE_KEY: ""
  # Vacio => usa la address de deployments/amoy.json
  CONTRACT_ADDRESS: ""
  SUPABASE_JWKS_URI: "https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json"
