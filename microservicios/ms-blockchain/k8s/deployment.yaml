apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-blockchain
  labels:
    app: ms-blockchain
spec:
  replicas: 1
  # Nodo unico con CPU al limite: Recreate evita el pod extra (surge) del
  # RollingUpdate, que no cabe y deja el deploy colgado en Pending.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ms-blockchain
  template:
    metadata:
      labels:
        app: ms-blockchain
    spec:
      containers:
        - name: ms-blockchain
          # __IMAGE__ lo reemplaza el pipeline de GitHub Actions
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: ms-blockchain-config
            - secretRef:
                name: ms-blockchain-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
