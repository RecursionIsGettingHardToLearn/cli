apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-diagnostico-ia
  labels:
    app: ms-diagnostico-ia
spec:
  replicas: 1
  # Nodo unico con CPU al limite: Recreate evita el pod extra (surge) del
  # RollingUpdate, que no cabe y deja el deploy colgado en Pending.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ms-diagnostico-ia
  template:
    metadata:
      labels:
        app: ms-diagnostico-ia
    spec:
      containers:
        - name: ms-diagnostico-ia
          # __IMAGE__ lo reemplaza el pipeline de GitHub Actions por
          # <ACR>.azurecr.io/ms-diagnostico-ia:<sha> en cada despliegue.
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ms-diagnostico-ia-config
            - secretRef:
                name: ms-diagnostico-ia-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

