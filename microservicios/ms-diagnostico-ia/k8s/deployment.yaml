apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-diagnostico-ia
  labels:
    app: ms-diagnostico-ia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-diagnostico-ia
  template:
    metadata:
      labels:
        app: ms-diagnostico-ia
    spec:
      containers:
        - name: ms-diagnostico-ia
          image: ms-diagnostico-ia:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ms-diagnostico-ia-config
            - secretRef:
                name: ms-diagnostico-ia-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

