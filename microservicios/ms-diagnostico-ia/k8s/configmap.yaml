apiVersion: v1
kind: ConfigMap
metadata:
  name: ms-diagnostico-ia-config
data:
  APP_NAME: ms-diagnostico-ia
  ENVIRONMENT: production
  PORT: "8000"
  CORS_ORIGINS: "http://localhost:4200,http://localhost:3000"
  GEMINI_MODEL: gemini-2.0-flash
  GEMINI_IMAGE_MODEL: gemini-2.0-flash
  GEMINI_FALLBACK_MODELS: gemini-2.5-flash,gemini-2.5-flash-lite
  OPENAI_MODEL: gpt-4o-mini
  OPENAI_TRANSCRIBE_MODEL: whisper-1
  DATABASE_URL: sqlite:////app/data/ms_ia.db
  UPLOAD_DIR: /app/data/uploads
  MAX_UPLOAD_MB: "15"
  # --- Persistencia durable en AWS (el pod de AKS es efimero). Ver guia §3. ---
  # Las credenciales AWS (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) van en el Secret.
  STORAGE_BACKEND: "dynamodb"
  AWS_REGION: "sa-east-1"
  DYNAMODB_TABLE: "ms2_diagnostico_ia"
  S3_BUCKET: "clinica-ms2-uploads-017013687780"
  S3_PREFIX: "uploads"
