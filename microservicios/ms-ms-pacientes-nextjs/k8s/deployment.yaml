apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-ms-pacientes-nextjs
  labels:
    app: ms-ms-pacientes-nextjs
spec:
  replicas: 1
  # Nodo unico con CPU al limite: Recreate evita el pod extra (surge) del
  # RollingUpdate, que no cabe y deja el deploy colgado en Pending.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ms-ms-pacientes-nextjs
  template:
    metadata:
      labels:
        app: ms-ms-pacientes-nextjs
    spec:
      containers:
        - name: ms-ms-pacientes-nextjs
          # __IMAGE__ lo reemplaza el pipeline de GitHub Actions por
          # <ACR>.azurecr.io/ms-ms-pacientes-nextjs:<sha> en cada despliegue.
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ms-ms-pacientes-nextjs-config
            - secretRef:
                name: ms-ms-pacientes-nextjs-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
