apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-backend
  labels:
    app: ms-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-backend
  template:
    metadata:
      labels:
        app: ms-backend
    spec:
      containers:
        - name: ms-backend
          # __IMAGE__ lo reemplaza el pipeline de GitHub Actions por
          # <ACR>.azurecr.io/ms-backend:<sha> en cada despliegue.
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ms-backend-config
            - secretRef:
                name: ms-backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
