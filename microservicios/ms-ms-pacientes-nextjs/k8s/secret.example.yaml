# PLANTILLA - NO commitear el secret real.
# Crear el secret directamente en el cluster con:
#
#   kubectl create secret generic ms-ms-pacientes-nextjs-secret -n clinica \
#     --from-literal=DATABASE_URL="postgresql://user:pass@host:6543/postgres?pgbouncer=true" \
#     --from-literal=DIRECT_URL="postgresql://user:pass@host:5432/postgres" \
#     --from-literal=SUPABASE_URL="https://TU_PROYECTO.supabase.co" \
#     --from-literal=SUPABASE_ISSUER="https://TU_PROYECTO.supabase.co/auth/v1" \
#     --from-literal=SUPABASE_JWKS_URI="https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json" \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY="tu_service_role_key"
#
apiVersion: v1
kind: Secret
metadata:
  name: ms-ms-pacientes-nextjs-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@host:6543/postgres?pgbouncer=true"
  DIRECT_URL: "postgresql://user:pass@host:5432/postgres"
  SUPABASE_URL: "https://TU_PROYECTO.supabase.co"
  SUPABASE_ISSUER: "https://TU_PROYECTO.supabase.co/auth/v1"
  SUPABASE_JWKS_URI: "https://TU_PROYECTO.supabase.co/auth/v1/.well-known/jwks.json"
  SUPABASE_SERVICE_ROLE_KEY: "tu_service_role_key"
