apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-springboot
  labels:
    app: ms-springboot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-springboot
  template:
    metadata:
      labels:
        app: ms-springboot
    spec:
      containers:
        - name: ms-springboot
          # __IMAGE__ lo reemplaza el pipeline de GitHub Actions
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ms-springboot-config
            - secretRef:
                name: ms-springboot-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
